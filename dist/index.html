    <style>
      section#top > .hero-topbar {
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      body > .freem-home-topbar-fixed.hero-topbar--global:not(.freem-home-topbar-entered) {
        visibility: hidden !important;
        opacity: 0 !important;
        transform: translate3d(-50%, -120%, 0) !important;
      }
    </style>
    <script>
      (() => {
        document.documentElement.classList.add("motion-ready");
        if ("scrollRestoration" in history) history.scrollRestoration = "manual";
        if (location.hash && location.hash !== "#top") {
          history.replaceState(null, "", `${location.pathname}${location.search}#top`);
        }
        const resetToHero = () => window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        resetToHero();
        window.addEventListener("DOMContentLoaded", resetToHero, { once: true });
        window.addEventListener(
          "load",
          () => {
            resetToHero();
            setTimeout(resetToHero, 80);
            setTimeout(resetToHero, 240);
          },
          { once: true }
        );
      })();
    </script>
